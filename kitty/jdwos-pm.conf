# --- COLORI PRINCIPALI ---
background            #0a0a0a
foreground            #f5f5f5
cursor                #ff3333

# --- COLORI SFUMATURE ---
# Nero (Regular e Bright)
color0  #121212
color8  #1f1f1f

# Rosso Scuro e Rosso Vivo
color1  #990000
color9  #ff3333

# Arancione (Regular e Bright)
#color2  #ff6600
#color10 #ff9933

# Giallo (Regular e Bright)
color3  #ffcc00
color11 #ffff33

# --- FINESTRA E TRASPARENZA ---
remember_window_size  no
initial_window_width  69c
initial_window_height 29c
background_opacity    0.85
background_blur       0

# Forza l'apertura della finestra esattamente al centro dello schermo
placement_strategy center

# --- STILE E BORDI ---
# Nasconde la barra del titolo per un look pulito e moderno
hide_window_decorations yes
window_padding_width    10

# --- FONT ---
# Imposta il font principale (usa quello che preferisci, es. JetBrains Mono)
font_family      JetBrainsMono Nerd Font
font_size        10.0

# --- PRESTAZIONI ---
# Sincronizza i frame con il monitor per evitare sfarfallii con la GIF
sync_to_monitor  yes

# --- ALTRO ---
# Disabilita il segnale acustico del terminale che potrebbe "aiutarli" a capire che è vivo
enable_audio_bell no
# Sincronizza il refresh rate del terminale con il monitor per animazioni fluidissime
repaint_delay 8
